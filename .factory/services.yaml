commands:
  install: npm install
  typecheck: npx tsc --noEmit -p tsconfig.json --pretty false
  typecheck_node: npx tsc --noEmit -p tsconfig.node.json --pretty false
  build: npm run build
  wasm_build: npm run wasm:build
  test: npx vitest run --config vitest.config.ts --maxConcurrency 4
  test_e2e: npx playwright test --workers 1
  test_e2e_gallery: npx playwright test src/e2e/demo-gallery.spec.ts --project=desktop --workers 1

services:
  dev:
    start: npm run dev -- --host 127.0.0.1 --port 5173
    stop: lsof -ti :5173 | xargs kill -9
    healthcheck: curl -sf http://127.0.0.1:5173/
    port: 5173
    depends_on: []

  local_relay:
    start: /Users/plebdev/Desktop/igloo-web-v2-prototype/bifrost-rs/target/release/bifrost-devtools relay --host 127.0.0.1 --port 8194
    stop: lsof -ti :8194 | xargs kill -9
    healthcheck: nc -z 127.0.0.1 8194
    port: 8194
    depends_on: []
